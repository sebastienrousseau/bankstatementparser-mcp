name: Feature Request
description: Suggest a new MCP tool, resource, or prompt for bankstatementparser-mcp
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        What can't you do today with bankstatementparser-mcp? If this surfaces an
        existing bankstatementparser helper, link to it.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: |
        Sketch the new tool / resource / prompt. Name, arguments,
        return shape. Reference the parent bankstatementparser API surface where
        relevant.
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Real-World Use Case
      description: How would an agent actually use this?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Tool
        - Resource
        - Prompt
        - Multiple
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
  - type: textarea
    id: contribution
    attributes:
      label: Willingness To Contribute
      description: Could you take a stab at the implementation or tests?
