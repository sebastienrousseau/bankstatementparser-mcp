name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # bankstatementparser-mcp depends on the core bankstatementparser library, which is not yet
      # published to PyPI. Install it from its GitHub repository first,
      # then install this package and its dev dependencies on top.
      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "bankstatementparser>=0.0.11"
          pip install -e .
          pip install pytest pytest-cov interrogate

      - name: Run tests with the 100% coverage gate
        run: |
          pytest tests/ \
            --cov=bankstatementparser_mcp --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=100 -v

      - name: Enforce 100% docstring coverage
        run: interrogate -c pyproject.toml bankstatementparser_mcp

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "bankstatementparser>=0.0.11"
          pip install -e .
          pip install ruff black mypy types-jsonschema

      - name: Ruff check
        run: ruff check bankstatementparser_mcp/ tests/

      - name: Black check
        run: black --check bankstatementparser_mcp/ tests/

      - name: Mypy
        run: mypy bankstatementparser_mcp/

  examples:
    name: Examples
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install bankstatementparser (from PyPI) + this package
        run: |
          python -m pip install --upgrade pip
          pip install "bankstatementparser>=0.0.11"
          pip install -e .

      - name: Run examples
        run: |
          for f in examples/*.py; do echo "=== $f ==="; python "$f"; done

  smoke:
    name: Smoke test (installed wheel)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Build the wheel and install it into a *clean* virtualenv so the
      # only code on sys.path is the installed artifact (the source tree
      # is deliberately excluded). This pulls bankstatementparser + mcp
      # from PyPI and catches packaging / CI-vs-local divergence.
      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip
          pip install build
          python -m build

      - name: Install the wheel into a clean venv
        run: |
          python -m venv "$RUNNER_TEMP/smoke"
          "$RUNNER_TEMP/smoke/bin/pip" install --upgrade pip
          "$RUNNER_TEMP/smoke/bin/pip" install dist/*.whl

      - name: Verify the installed artifact
        run: |
          "$RUNNER_TEMP/smoke/bin/python" -c "import bankstatementparser_mcp; print(bankstatementparser_mcp.__version__)"

      - name: Run an example against the installed package
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/smoke/bin/python" "$GITHUB_WORKSPACE/examples/01_mcp_tools.py"
